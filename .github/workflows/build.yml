name: build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vst3:
    name: build vst3
    runs-on: windows-2022
    outputs:
      asset_name: ${{ steps.package.outputs.asset_name }}

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: build
        run: cmake --build build --config Release --target AllPassPhase_VST3

      - name: package vst3
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vst3Path = 'build/AllPassPhase_artefacts/Release/VST3/AllPassPhase+.vst3'
          if (-not (Test-Path -LiteralPath $vst3Path)) {
            throw "vst3 bundle not found at $vst3Path"
          }

          $sha = '${{ github.sha }}'
          $version = $sha.Substring(0, 7)
          $releaseTag = '${{ github.event.release.tag_name }}'
          if (-not [string]::IsNullOrWhiteSpace($releaseTag)) {
            $version = $releaseTag
          } elseif ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'
          }

          $safeVersion = $version -replace '[\\/:*?"<>|]', '-'
          $assetName = "AllPassPhasePlus-$safeVersion-windows-vst3.zip"
          Compress-Archive -LiteralPath $vst3Path -DestinationPath $assetName -Force

          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: AllPassPhasePlus-windows-vst3
          path: ${{ steps.package.outputs.asset_name }}
          if-no-files-found: error

  release:
    name: publish release
    runs-on: windows-2022
    needs: vst3
    if: (github.event_name == 'push' && github.ref_type == 'tag') || github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: download build artifact
        uses: actions/download-artifact@v8
        with:
          name: AllPassPhasePlus-windows-vst3
          path: release

      - name: publish release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $tag = '${{ github.event.release.tag_name }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = '${{ github.ref_name }}'
          }

          $asset = Join-Path 'release' '${{ needs.vst3.outputs.asset_name }}'
          if (-not (Test-Path -LiteralPath $asset)) {
            throw "release asset not found at $asset"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "failed to upload $asset to release $tag"
            }
          } else {
            gh release create $tag $asset --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              throw "failed to create release $tag"
            }
          }
